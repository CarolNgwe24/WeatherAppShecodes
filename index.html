<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
    <link rel="stylesheet" href="src/styles.css" />
    <title>My weather application</title>
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form id="search-form">
          <input
            type="search"
            placeholder="Enter a city"
            required
            id="search-input"
          />
          <input type="submit" value="Search" class="search-button" />
        </form>
      </header>
      <main>
        <div class="weather-details">
          <div>
            <h1 id="city-display">City Name</h1>
            <p id="description">Weather Description</p>
              <div class="temperature-container">
              <img src=""alt="Weather Icon" id="icon"/>
              <span id="temperature">---</span>
              <span class="unit">
                <a href="#" id="celsius-link">°C</a>
              </span>
          </div>
          <div class="more-info">
            <p>Wind Speed:<span id="wind-speed">---</span
            >km/s</p>
          </div>
        </div>
      </main>
      <footer>
        <p>
          This project was coded by
          <a href="https://github.com/CarolNgwe24/"target="_blank"
            >Carol Ngwenya</a
          > and is
          <a href="https://github.com/CarolNgwe24/SheCodes-Learning-Project/" target="_blank">
             on github
           </a>
           and
          <a href="https://shecodeslearning.netlify app" target="_blank"
            > hosted on Netlify</a>
          </a>
        </p>
      </footer>
    </div>
    <script src="index.js" defer></script>
  </body>
</html>
